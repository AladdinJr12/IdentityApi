{% extends "htmlTemplates/base.html" %}

{% block content %}

<div class="container-fluid formSect align-items-center d-flex justify-content-center pb-5">
    <div class="card formCard text-center mt-5 pb-5" >
        <div class="card-body ">
            <h1> 
                Forgot your password
            </h1>
            
            <p class="text-muted mb-4">
                Please enter your account's email
            </p>

            <!-- For in case the input email was wrong/invalid -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
            {% csrf_token %}
                <input type="email"
                    name="registered_email"
                    class="form-control text-center fs-3 letter-spacing"
                    required>

                    <button type="submit" class="forgetPasswordPageBtn  mt-3">
                        Request reset password link
                    </button>

                    <a href="{% url 'login' %}"
                        class=" forgetPasswordPageBtn text-decoration-none d-block  mt-3 pt-2 mx-auto"
                        id="backToLoginBtn">
                            Back to login
                    </a>

            </form>
            

            
        </div>

    </div>
        
</div>




{% endblock %}
