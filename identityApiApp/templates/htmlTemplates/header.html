{% load static %}
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title> prototype of api and profile management system</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" type="text/css" href="{% static 'css/main.css' %}">
    <!---Bootstrap link-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- links for the css of the symbols at the footer, contact btn and header's status button-->
    <link rel="stylesheet"
    href="https://unpkg.com/boxicons@latest/css/boxicons.min.css">

</head>
<body class= "mainBody d-flex flex-column min-vh-100">
    <main class="">
        <div class="container-fluid HeaderSect">
            <nav class="navbar  justify-content-center">
                <div class="d-flex align-items-center gap-2 pt-2 pb-3">
                    <!-- Title -->
                    <a class="nav-link position-relative p-0  " href="{% url 'index' %}">            
                        <span class="navbar-brand mb-0 h1 appTitleHover">
                            <span class="appTitle ">Identi</span><span class="Qword ">Q</span>
                        </span>
                    </a>
    

                    <!-- Notification Bell if the user is logged in -->
                    {% if user.is_authenticated %}.
                        <a class="nav-link position-relative p-0 " href="{% url 'notifications' %}">
                            <i class='bx bxs-bell header-nav-text bell'></i>
                            
                            <span id="notificationDot"
                                class=" badge rounded-pill bg-danger d-none ">
                                    !
                            </span>
                        </a>
                    {% endif %}

                </div>
            </nav>
        </div>


<script>
//-------for the notification bell-------//
    function checkForNotificationUpdates() {
        fetch("{% url 'check_for_new_notifications' %}")
        .then(response => response.json())
        .then(data => {
            const notificationDot = document.getElementById("notificationDot");

            if (data.has_new_updates) {
                notificationDot.classList.remove("d-none"); //---Show red dot---//
                notificationDot.textContent = data.notification_count //---Show the number of notifications---// 
            } else {
                notificationDot.classList.add("d-none"); //---Hide red dot---//
            }
        })
        .catch(error => console.error("Error when checking updates:", error));
    }

    // Run check every 10 seconds
    setInterval(checkForNotificationUpdates, 10000);

    // Run on page load
    checkForNotificationUpdates();
</script>
